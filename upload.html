<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رفع مشروع - IT Guide</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .upload-page { padding: 2rem 0; }
        .page-header { text-align: center; margin-bottom: 2rem; }
        .upload-form { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); max-width: 800px; margin: 0 auto; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
        .tech-selector { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; }
        .selected-techs { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; min-height: 45px; }
        .tech-tag { background: #f0f4ff; color: var(--primary); padding: 5px 12px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; }
        .tech-tag .remove { cursor: pointer; color: #999; }
        .tech-list { display: flex; flex-wrap: wrap; gap: 0.5rem; max-height: 150px; overflow-y: auto; }
        .tech-option { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; background: var(--light); border-radius: 8px; cursor: pointer; }
        .form-actions { display: flex; justify-content: space-between; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee; }
        .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
        .alert-info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo"><a href="index.html"><i class="fas fa-code"></i><span>IT Guide</span></a></div>
                <ul class="nav-links">
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="projects.html">المشاريع</a></li>
                    <li><a href="upload.html" class="active">رفع مشروع</a></li>
                    <li><a href="about.html">عن المنصة</a></li>
                </ul>
                <button class="menu-toggle"><i class="fas fa-bars"></i></button>
            </nav>
        </div>
    </header>

    <main class="upload-page">
        <div class="container">
            <div class="page-header">
                <h1><i class="fas fa-cloud-upload-alt"></i> رفع مشروع جديد</h1>
                <p>شارك مشروعك مع مجتمع الطلاب</p>
            </div>

            <div class="upload-form">
                <form id="uploadForm">
                    <div class="form-group">
                        <label>اسم المشروع <span style="color:red;">*</span></label>
                        <input type="text" id="projectTitle" required>
                    </div>

                    <div class="form-group">
                        <label>وصف المشروع <span style="color:red;">*</span></label>
                        <textarea id="projectDescription" rows="4" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>المستوى الدراسي <span style="color:red;">*</span></label>
                        <select id="projectLevel" required>
                            <option value="">اختر المستوى</option>
                            <option value="1">مستوى أول</option>
                            <option value="2">مستوى ثاني</option>
                            <option value="3">مستوى ثالث</option>
                            <option value="4">مشروع تخرج</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>التخصص <span style="color:red;">*</span></label>
                        <select id="projectCategory" required>
                            <option value="">اختر التخصص</option>
                            <option value="web">برمجة الويب</option>
                            <option value="mobile">تطبيقات الجوال</option>
                            <option value="ai">الذكاء الاصطناعي</option>
                            <option value="database">قواعد البيانات</option>
                            <option value="network">الشبكات</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>التقنيات المستخدمة <span style="color:red;">*</span></label>
                        <div class="tech-selector">
                            <div class="selected-techs" id="selectedTechs"></div>
                            <div class="tech-list" id="techList">
                                <label class="tech-option"><input type="checkbox" value="HTML"> HTML</label>
                                <label class="tech-option"><input type="checkbox" value="CSS"> CSS</label>
                                <label class="tech-option"><input type="checkbox" value="JavaScript"> JavaScript</label>
                                <label class="tech-option"><input type="checkbox" value="Python"> Python</label>
                                <label class="tech-option"><input type="checkbox" value="PHP"> PHP</label>
                                <label class="tech-option"><input type="checkbox" value="React"> React</label>
                                <label class="tech-option"><input type="checkbox" value="Node.js"> Node.js</label>
                                <label class="tech-option"><input type="checkbox" value="MySQL"> MySQL</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>رابط المشروع (اختياري)</label>
                        <input type="url" id="projectURL" placeholder="https://...">
                    </div>

                    <div class="form-group">
                        <label>رابط GitHub (اختياري)</label>
                        <input type="url" id="githubURL" placeholder="https://github.com/...">
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="resetForm()">إعادة تعيين</button>
                        <button type="submit" class="btn btn-primary">نشر المشروع</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section"><h3>IT Guide</h3><p>منصة مشاريع الطلاب</p></div>
            </div>
            <div class="footer-bottom"><p>© 2026 IT Guide</p></div>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/upload.js"></script>
</body>
</html>
