<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المشروع - IT Guide</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .project-detail { padding: 2rem 0; }
        .back-link { display: inline-block; margin-bottom: 1.5rem; color: var(--primary); text-decoration: none; }
        .project-card-detail { background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .project-title-detail { font-size: 2rem; margin-bottom: 1rem; }
        .project-meta { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .project-meta span { background: var(--light); padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.9rem; }
        .project-description-detail { margin-bottom: 2rem; line-height: 1.8; }
        .tech-section { margin-bottom: 2rem; }
        .tech-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
        .stats-section { display: flex; gap: 2rem; flex-wrap: wrap; margin: 2rem 0; padding: 1rem; background: var(--light); border-radius: 15px; }
        .stat-item { text-align: center; flex: 1; }
        .stat-item i { font-size: 1.5rem; color: var(--primary); }
        .stat-item .number { font-size: 1.5rem; font-weight: bold; display: block; }
        .action-buttons { display: flex; gap: 1rem; margin-top: 2rem; }
        .not-found { text-align: center; padding: 3rem; }
        .comments-section { margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #eee; }
        .comment-form { margin-bottom: 2rem; }
        .comment-form textarea { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 1rem; }
        .comment-item { background: var(--light); padding: 1rem; border-radius: 10px; margin-bottom: 1rem; }
        .comment-author { font-weight: bold; margin-bottom: 0.5rem; }
        .comment-time { font-size: 0.8rem; color: var(--gray); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo"><a href="index.html"><i class="fas fa-code"></i><span>IT Guide</span></a></div>
                <ul class="nav-links">
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="projects.html">المشاريع</a></li>
                    <li><a href="upload.html">رفع مشروع</a></li>
                    <li><a href="about.html">عن المنصة</a></li>
                </ul>
                <button class="menu-toggle"><i class="fas fa-bars"></i></button>
            </nav>
        </div>
    </header>

    <main class="project-detail">
        <div class="container">
            <a href="projects.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للمشاريع</a>
            
            <div id="projectContent">
                <div class="project-card-detail">
                    <div style="text-align: center; padding: 3rem;">
                        <i class="fas fa-spinner fa-pulse"></i> جاري تحميل المشروع...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section"><h3>IT Guide</h3><p>منصة مشاريع الطلاب</p></div>
            </div>
            <div class="footer-bottom"><p>© 2026 IT Guide</p></div>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/project-detail.js"></script>
</body>
</html>
